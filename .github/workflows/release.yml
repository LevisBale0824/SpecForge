name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

# 同一个 release 只跑一次，避免重复发布
concurrency:
  group: release-${{ github.event.release.id }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & Publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & Publish
        run: pnpm electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
