name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

# 同一个 release 只跑一次，避免重复发布
concurrency:
  group: release-${{ github.event.release.id }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & Publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # 清空 .npmrc 里的中国镜像配置（CI 在美国，直接用 GitHub 官方源）
          ELECTRON_MIRROR: ""
          ELECTRON_BUILDER_BINARIES_MIRROR: ""
          npm_config_electron_mirror: ""
          npm_config_electron_builder_binaries_mirror: ""

      # electron 42 没有	postinstall，必须显式触发一次下载，
      # 否则会在 build 时懒加载触发，且在某些环境下会卡死
      - name: Pre-download Electron binary
        run: node node_modules/electron/install.js
        env:
          ELECTRON_MIRROR: ""
          npm_config_electron_mirror: ""

      - name: Build & Publish
        run: |
          echo "=== [1/3] vue-tsc ==="
          pnpm vue-tsc --noEmit
          echo "=== [2/3] vite build (ELECTRON=true) ==="
          pnpm vite build
          echo "=== [3/3] electron-builder ==="
          pnpm electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON: "true"
          ELECTRON_MIRROR: ""
          npm_config_electron_mirror: ""
          ELECTRON_BUILDER_BINARIES_MIRROR: ""
          npm_config_electron_builder_binaries_mirror: ""
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
